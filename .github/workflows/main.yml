name: Build and Test

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-android:
    name: Build Android App (Kotlin/Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # gradlew ကို အသုံးပြုခွင့် (Permission) ပေးခြင်း
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # အဆင့်မြင့် Gradle script များကို စိတ်ချရသော Bash Shell ဖြင့် တည်ဆောက်ခြင်း
      - name: Build Android Debug APK
        shell: bash
        run: ./gradlew assembleDebug

      # ထွက်လာသော APK ဖိုင်ကို တင်ပေးခြင်း
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: mguard-vpn-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
