name: Build and Test

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-android:
    name: Build Android App (Kotlin/Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # gradlew ထဲက sh နေရာမှာ bash ပြောင်းပြီး Syntax Error မတက်အောင် ဖြေရှင်းခြင်း
      - name: Fix Gradlew Shebang and Grant Permission
        run: |
          sed -i 's|#!/usr/bin/env sh|#!/usr/bin/env bash|g' gradlew
          sed -i 's|#!/bin/sh|#!/usr/bin/env bash|g' gradlew
          chmod +x gradlew

      # အသစ်ပြင်ဆင်ထားတဲ့ gradle-wrapper.properties (8.4) ကို သုံးပြီး ဒေါင်းလုဒ်ဆွဲကာ တည်ဆောက်မည်
      - name: Build Android Debug APK
        shell: bash
        run: ./gradlew assembleDebug

      # ထွက်လာသော APK ဖိုင်ကို Upload တင်ပေးခြင်း
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: mguard-vpn-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
