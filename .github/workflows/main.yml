name: Build and Test

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-android:
    name: Build Android App (Kotlin/Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 1. အဟောင်းတွေကို အရင်ဖြတ်ထုတ်မယ်
      - name: Clean Old Gradle Wrapper
        run: |
          rm -f gradlew
          rm -rf gradle/wrapper

      # 2. ပြင်ပကနေ Gradle 8.4 ကို ယာယီ Setup လုပ်မယ်
      - name: Setup Temporary Gradle for Regeneration
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      # 3. အရေးကြီးဆုံးအဆင့် - ပရောဂျက်ထဲက build.gradle တွေကို ဝင်မဖတ်ဘဲ Wrapper သီးသန့်ဆောက်ခိုင်းမယ်
      - name: Regenerate Clean Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4 --no-daemon -x evaluate -x compileJava

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Android Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: mguard-vpn-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
