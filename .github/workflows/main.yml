name: Build and Test

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-android:
    name: Build Android App (Kotlin/Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ၁။ gradlew Syntax Error မတက်အောင် ဖြေရှင်းခြင်း
      - name: Fix Gradlew Shebang and Grant Permission
        run: |
          sed -i 's|#!/usr/bin/env sh|#!/usr/bin/env bash|g' gradlew
          sed -i 's|#!/bin/sh|#!/usr/bin/env bash|g' gradlew
          chmod +x gradlew

      # ၂။ ပျောက်ဆုံးနေတဲ့ ကာလာ၊ သီမ်း ဖိုင်များကို ယာယီဖြည့်ဆောက်ခြင်း
      - name: Generate Missing Dummy Resources
        run: |
          mkdir -p app/src/main/res/values

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.MGuardVPN" parent="android:Theme.DeviceDefault" />
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_dark">#121212</color>
              <color name="bg_card">#1E1E1E</color>
              <color name="teal_400">#26A69A</color>
              <color name="teal_950">#002422</color>
              <color name="text_muted">#888888</color>
              <color name="amber_400">#FFCA28</color>
              <color name="green_500">#4CAF50</color>
          </resources>
          EOF

      # ၃။ Icon Configuration နှင့် Warning များကို သန့်ရှင်းရေးလုပ်ခြင်း
      - name: Patch AndroidManifest for System Compatibility
        run: |
          if [ -f app/src/main/AndroidManifest.xml ]; then
            sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' app/src/main/AndroidManifest.xml
            sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"||g' app/src/main/AndroidManifest.xml
            sed -i 's|package="com.mguard.vpn"||g' app/src/main/AndroidManifest.xml
          fi

      # ၄။ Android Debug APK ကို တည်ဆောက်ခြင်း
      - name: Build Android Debug APK
        shell: bash
        run: ./gradlew assembleDebug

      # ၅။ ထွက်လာသော APK ဖိုင်ကို တင်ပေးခြင်း
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: mguard-vpn-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
