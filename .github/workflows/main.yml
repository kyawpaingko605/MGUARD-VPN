name: Build and Test

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  # Job 1: Build the Vite + React Web Application
  build-web:
    name: Build Web App (Vite + React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './package-lock.json' # Root မှာရှိတဲ့ package-lock ကို တိုက်ရိုက်ဖတ်ပါမယ်

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Web Production Bundle
        run: npm run build

      - name: Upload Web Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-production-build
          path: dist/ # Root မှာ ထွက်လာမယ့် dist folder

  # Job 2: Build the Android Application
  build-android:
    name: Build Android App (Kotlin/Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # gradlew wrapper မရှိရင် ပြန်ဆောက်ပေးမယ့် အပိုင်း (အပြင်ဆုံးမှာပဲ စစ်ပါတယ်)
      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f "gradlew" ]; then
            sudo apt-get update && sudo apt-get install -y gradle
            gradle wrapper
          fi

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Android Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: mguard-vpn-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk # အပြင်ဆုံးမှာရှိတဲ့ app folder ဆီက apk ကို ယူပါမယ်
